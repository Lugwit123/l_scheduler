<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#2563EB" />
  <!-- Large clock face - centered, fills most of the space -->
  <circle cx="32" cy="32" r="24" fill="#ffffff" />
  <!-- Thick clock rim -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#1E40AF" stroke-width="3" />
  <!-- Bold hour markers (only 4 cardinal) -->
  <line x1="32" y1="11" x2="32" y2="16" stroke="#1E40AF" stroke-width="3" stroke-linecap="round" />
  <line x1="32" y1="48" x2="32" y2="53" stroke="#1E40AF" stroke-width="3" stroke-linecap="round" />
  <line x1="11" y1="32" x2="16" y2="32" stroke="#1E40AF" stroke-width="3" stroke-linecap="round" />
  <line x1="48" y1="32" x2="53" y2="32" stroke="#1E40AF" stroke-width="3" stroke-linecap="round" />
  <!-- Hour hand - bold -->
  <line x1="32" y1="32" x2="32" y2="19" stroke="#1E40AF" stroke-width="4" stroke-linecap="round" />
  <!-- Minute hand - bold -->
  <line x1="32" y1="32" x2="43" y2="26" stroke="#2563EB" stroke-width="3" stroke-linecap="round" />
  <!-- Center gear decoration -->
  <circle cx="32" cy="32" r="6" fill="#2563EB" />
  <circle cx="32" cy="32" r="3" fill="#ffffff" />
  <!-- Gear teeth around center -->
  <rect x="30.5" y="24" width="3" height="4" rx="1" fill="#2563EB" />
  <rect x="30.5" y="36" width="3" height="4" rx="1" fill="#2563EB" />
  <rect x="24" y="30.5" width="4" height="3" rx="1" fill="#2563EB" />
  <rect x="36" y="30.5" width="4" height="3" rx="1" fill="#2563EB" />
  <rect x="25.8" y="25.8" width="3" height="3.5" rx="1" fill="#2563EB" transform="rotate(45 27.3 27.55)" />
  <rect x="35.2" y="35.2" width="3" height="3.5" rx="1" fill="#2563EB" transform="rotate(45 36.7 36.95)" />
  <rect x="35.2" y="25.8" width="3" height="3.5" rx="1" fill="#2563EB" transform="rotate(-45 36.7 27.55)" />
  <rect x="25.8" y="35.2" width="3" height="3.5" rx="1" fill="#2563EB" transform="rotate(-45 27.3 36.95)" />
</svg>
